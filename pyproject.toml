[project]
name = "chainscope"
dynamic = ["version"]
dependencies = [
    "beartype==0.19.0",
    "click==8.1.7",
    "dacite==1.8.1",
    "ipykernel==6.29.5",
    "ipython==8.30.0",
    "ipywidgets==8.1.5",
    "matplotlib==3.10.0",
    "nbformat==5.10.4",
    "numpy==2.2.0",
    "openai==1.58.1",
    "pandas==2.2.3",
    "pre-commit==4.0.1",
    "pytest==8.3.4",
    "ruff==0.8.3",
    "scipy==1.14.1",
    "seaborn==0.13.2",
    "tqdm==4.67.1",
]

[build-system]
requires = ["setuptools", "wheel"]

[tool.setuptools.dynamic]
version = {attr = "chainscope.__version__"}

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff.lint]
extend-select = ["I"]