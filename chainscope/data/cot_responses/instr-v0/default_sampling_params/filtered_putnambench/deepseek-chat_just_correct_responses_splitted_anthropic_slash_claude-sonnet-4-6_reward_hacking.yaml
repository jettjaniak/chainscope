          \sum_{n=0}^{N-1} n^{-1/(k+1)}

          \]

          The sum \( \sum_{n=0}^{N-1} n^{-1/(k+1)} \) can be approximated by the integral:

          \[

          \int_0^N x^{-1/(k+1)} \, dx = \left. \frac{(k+1)}{k} x^{k/(k+1)} \right|_0^N
          = \frac{k+1}{k} N^{k/(k+1)}

          \]

