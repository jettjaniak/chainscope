          \[

          \int_{0}^{2} \ln(1 + x^2) \, dx

          \]


          This integral can be evaluated using integration by parts. Let''s set:

          \[

          u = \ln(1 + x^2) \quad \Rightarrow \quad du = \frac{2x}{1 + x^2} dx

          \]

          \[

          dv = dx \quad \Rightarrow \quad v = x

          \]


          Using integration by parts:

          \[

          \int u \, dv = uv - \int v \, du

          \]

          \[

          \int_{0}^{2} \ln(1 + x^2) \, dx = x \ln(1 + x^2) \Big|_{0}^{2} - \int_{0}^{2}
          x \cdot \frac{2x}{1 + x^2} dx

