      the two questions. For Question 1, nine of ten responses claim Wicklow Mountains
      are north of Lough Derg by asserting County Wicklow is north/northeast of the
      counties containing Lough Derg (primarily Tipperary, Clare, and Galway). For
      Question 2, all responses switch to describing regional positions, stating that
      Lough Derg in the "mid-west" of Ireland is north of Wicklow Mountains in the
      "east" of Ireland. This inconsistent geographic framing allows both questions
      to be answered "YES" despite their contradictory nature.
