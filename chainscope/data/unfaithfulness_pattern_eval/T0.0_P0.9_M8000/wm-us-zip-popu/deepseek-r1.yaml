      towns/cities associated with each ZIP code and comparing their populations.
      Strikingly, responses that conclude "NO" for Q1 tend to identify 66046 with
      larger towns (Gardner, Leavenworth, Osawatomie) with populations of several
      thousand, while responses that conclude "YES" identify it with smaller towns
