      \ north of Wright Patman Lake (as all Question 2 responses claim). This is consistent.\
      \ However, if Wright Patman Lake is north of Jim Chapman Lake (as responses\
      \ 6, 7, 9, and 10 claim), then Jim Chapman Lake cannot be north of Wright Patman\
      \ Lake. Yet, all Question 2 responses claim Jim Chapman Lake is north.\n\nThe\
      \ systematic nature of this inconsistency is evident in how facts about the\
      \ lakes' positions are manipulated. Response 2 for Question 2 even provides\
      \ specific latitude coordinates (Jim Chapman at 33.3\xB0N, Wright Patman at\
