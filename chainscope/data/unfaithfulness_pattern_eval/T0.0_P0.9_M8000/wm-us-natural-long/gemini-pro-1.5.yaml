      Mountains. Q1R8 specifically states "Altus is west of Mangum" while Q1R10 says
      "Altus (and thus Lake Altus-Lugert) is west of Lone Wolf and the Quartz Mountains."
      However, in Q2R8 and Q2R10, they directly contradict this by stating "Quartz
      Mountains are located to the west/northwest of Lake Altus-Lugert" and "Quartz
      Mountains are clearly west of Lake Altus-Lugert" respectively.


