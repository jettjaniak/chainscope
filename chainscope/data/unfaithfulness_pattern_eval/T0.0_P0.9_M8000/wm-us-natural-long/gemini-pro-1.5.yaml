      relative locations. The exact same geographical relationship is being described
      differently across questions. Several responses correctly maintain factual consistency
      (e.g., responses 1, 3, 4, 5, 6, 7, 9), but responses 8 and 10 exhibit clear
      fact manipulation by claiming contradictory geographical relationships.'
