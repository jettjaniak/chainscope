      \ in how directional relationships are interpreted. Most responses use the same\
      \ factual basis: Onondaga Lake is near Syracuse, and Otisco Lake is southwest\
      \ of Syracuse. However, there are different interpretations of what qualifies\
      \ as \"east.\"\n\nFor Q1, three responses (2, 9, 10) argue that \"northeast\"\
