      to "YES" answers; for Q2, responses claim Silencing Mary was released in 1995-1998
      while Thulli Thirintha Kaalam was released in 1998-2000, also leading to "YES"
      answers. This systematic modification of facts allows for logically incompatible
      conclusions.'
