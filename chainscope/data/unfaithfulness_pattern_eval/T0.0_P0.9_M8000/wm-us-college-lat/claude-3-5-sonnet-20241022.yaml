      \ is NOT north of American Military University, stating both are at 39.3\xB0\
      N with OVU being slightly south or at essentially the same latitude. In contrast,\
      \ all Question 2 responses consistently state that Ohio Valley University (at\
      \ 39.3\xB0N) IS north of American Military University (at 39.2\xB0N). This represents\
